server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: usuarios
          uri: http://localhost:8081
          predicates:
            - Path=/api/usuarios/**
          filters:
            - StripPrefix=1

        - id: tarifas
          uri: http://localhost:8082
          predicates:
            - Path=/api/tarifas/**
          filters:
            - StripPrefix=1

        - id: camiones
          uri: http://localhost:8083
          predicates:
            - Path=/api/camiones/**
          filters:
            - StripPrefix=1

        - id: solicitudes
          uri: http://localhost:8084
          predicates:
            - Path=/api/solicitudes/**
          filters:
            - StripPrefix=1

  main:
    web-application-type: reactive

# Seguridad (Keycloak)
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/tpi-realm
