server:
  port: 8080

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive

  security:
    oauth2:
      resourceserver:
        jwt:
          # IMPORTANTE: dentro de Docker el hostname de Keycloak es "keycloak"
          issuer-uri: http://keycloak:8080/realms/backend

  cloud:
    gateway:
      default-filters:
        - TokenRelay
        - AddResponseHeader=X-Gateway, Grupo114

      routes:

        # ===============================
        # MS-USUARIOS
        # ===============================
        - id: ms-usuarios
          uri: http://ms-usuarios:8080
          predicates:
            - Path=/usuarios/**, /clientes/**, /transportistas/**
          filters:
            - TokenRelay

        # ===============================
        # MS-TARIFAS
        # ===============================
        - id: ms-tarifas
          uri: http://ms-tarifas:8080
          predicates:
            - Path=/tarifas/**

        # ===============================
        # MS-CAMIONES
        # ===============================
        - id: ms-camiones
          uri: http://ms-camiones:8080
          predicates:
            - Path=/camiones/**, /depositos/**

        # ===============================
        # MS-SOLICITUDES
        # ===============================
        - id: ms-solicitudes
          uri: http://ms-solicitudes:8080
          predicates:
            - Path=/solicitudes/**, /tramos/**, /rutas/**
          filters:
            - TokenRelay

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
