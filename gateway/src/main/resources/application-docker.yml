server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        # Usuarios Service Route
        - id: usuarios
          uri: http://ms-usuarios:8081
          predicates:
            - Path=/api/usuarios/**
          filters:
            - StripPrefix=1

        # Tarifas Service Route
        - id: tarifas
          uri: http://ms-tarifas:8082
          predicates:
            - Path=/api/tarifas/**
          filters:
            - StripPrefix=1

        # Camiones Service Route
        - id: camiones
          uri: http://ms-camiones:8083
          predicates:
            - Path=/api/camiones/**
          filters:
            - StripPrefix=1

        # Solicitudes Service Route
        - id: solicitudes
          uri: http://ms-solicitudes:8084
          predicates:
            - Path=/api/solicitudes/**
          filters:
            - StripPrefix=1

  main:
    web-application-type: reactive

  # Configuración de seguridad para Docker
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/tpi-realm  # Usa el nombre del servicio de Keycloak

# Actuator endpoints para health checks
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true  # Habilita health probes para Kubernetes/Docker