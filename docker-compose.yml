version: '3.9'

services:

  ####################################################
  # 🔐 KEYCLOAK
  ####################################################
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    command:
      - start-dev
      - --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak/realm:/opt/keycloak/data/import
    ports:
      - "8081:8080"
    networks:
      - tpi-net

  ####################################################
  # 🚪 API GATEWAY
  ####################################################
  api-gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    depends_on:
      - keycloak
      - ms-usuarios
      - ms-tarifas
      - ms-camiones
      - ms-solicitudes
    networks:
      - tpi-net

  ####################################################
  # 👤 MS USUARIOS + DB
  ####################################################
  usuarios-db:
    image: postgres:15
    environment:
      POSTGRES_DB: usuariosdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - usuarios_data:/var/lib/postgresql/data
    networks:
      - tpi-net
    ports:
      - "5433:5432"

  ms-usuarios:
    build: ./MS-Usuarios
    depends_on:
      - usuarios-db
    networks:
      - tpi-net

  ####################################################
  # 💵 MS TARIFAS + DB
  ####################################################
  tarifas-db:
    image: postgres:15
    environment:
      POSTGRES_DB: tarifasdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - tarifas_data:/var/lib/postgresql/data
    networks:
      - tpi-net
    ports:
      - "5434:5432"

  ms-tarifas:
    build: ./MS-Tarifas
    depends_on:
      - tarifas-db
    networks:
      - tpi-net

  ####################################################
  # 🚚 MS CAMIONES + DB
  ####################################################
  camiones-db:
    image: postgres:15
    environment:
      POSTGRES_DB: camionesdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - camiones_data:/var/lib/postgresql/data
    networks:
      - tpi-net
    ports:
      - "5435:5432"

  ms-camiones:
    build: ./MS-Camiones
    depends_on:
      - camiones-db
    networks:
      - tpi-net

  ####################################################
  # 📦 MS SOLICITUDES + DB
  ####################################################
  solicitudes-db:
    image: postgres:15
    environment:
      POSTGRES_DB: solicitudesdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - solicitudes_data:/var/lib/postgresql/data
    networks:
      - tpi-net
    ports:
      - "5436:5432"

  ms-solicitudes:
    build: ./MS-Solicitudes
    depends_on:
      - solicitudes-db
    networks:
      - tpi-net

  ####################################################
  # 🎨 FRONTEND
  ####################################################
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    networks:
      - tpi-net
    depends_on:
      - api-gateway
      - keycloak

networks:
  tpi-net:
    driver: bridge

volumes:
  usuarios_data:
  tarifas_data:
  camiones_data:
  solicitudes_data:
